let currentFilter = 'all';
let revealedCount = 0;
let revealedSet = new Set();

function countByTag(tag) {
  if (tag === 'all') return questions.length;
  return questions.filter(q => q.tags.includes(tag)).join('') || questions.filter(q => q.tags.includes(tag)).length;
}

function updateCounts() {
  const tags = ['all','task1','task2','task3','task4','design','tricky'];
  tags.forEach(t => {
    const count = t === 'all' ? questions.length : questions.filter(q => q.tags.includes(t)).length;
    const el = document.getElementById('c-' + t);
    if (el) el.textContent = count;
  });
}

function filter(tag) {
  currentFilter = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tag-btn').forEach(b => {
    if (b.getAttribute('onclick') === `filter('${tag}')`) b.classList.add('active');
  });
  renderCards();
}

function toggleAnswer(idx) {
  const ans = document.getElementById('ans-' + idx);
  const btn = document.getElementById('btn-' + idx);
  if (ans.classList.contains('visible')) {
    ans.classList.remove('visible');
    btn.textContent = 'Show Answer';
  } else {
    ans.classList.add('visible');
    btn.textContent = 'Hide Answer';
    if (!revealedSet.has(idx)) {
      revealedSet.add(idx);
      revealedCount++;
    }
    updateStats();
  }
}

function updateStats() {
  const visible = currentFilter === 'all' ? questions.length : questions.filter(q => q.tags.includes(currentFilter)).length;
  document.getElementById('stat-total').textContent = visible;
  document.getElementById('stat-revealed').textContent = revealedSet.size;
  const pct = questions.length > 0 ? Math.round((revealedSet.size / questions.length) * 100) : 0;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${revealedSet.size} of ${questions.length} revealed`;
}

function renderCards() {
  const container = document.getElementById('cards-container');
  const filtered = currentFilter === 'all' ? questions : questions.filter(q => q.tags.includes(currentFilter));

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No questions in this category.</div>';
    return;
  }

  container.innerHTML = filtered.map((q, i) => {
    const globalIdx = questions.indexOf(q);
    const diffClass = q.difficulty === 'hard' ? 'hard' : q.difficulty === 'medium' ? 'medium' : 'easy';
    const diffLabel = q.difficulty.charAt(0).toUpperCase() + q.difficulty.slice(1);
    const codeBlock = q.code ? `<div class="code-snip">${q.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : '';
    const tipBlock = q.tip ? `<div class="tip">${q.tip}</div>` : '';
    const isVisible = revealedSet.has(globalIdx);
    return `
    <div class="card">
      <div class="card-meta">
        <span class="badge badge-${q.badge}">${q.label}</span>
        <span class="difficulty ${diffClass}">${diffLabel}</span>
      </div>
      <div class="question">${q.q}</div>
      ${codeBlock}
      <button class="reveal-btn" id="btn-${globalIdx}" onclick="toggleAnswer(${globalIdx})">${isVisible ? 'Hide Answer' : 'Show Answer'}</button>
      <div class="answer ${isVisible ? 'visible' : ''}" id="ans-${globalIdx}">
        ${q.answer}
        ${tipBlock}
      </div>
    </div>`;
  }).join('');

  document.getElementById('stat-total').textContent = filtered.length;
  updateStats();
}

updateCounts();
renderCards();
updateStats();
</script>
